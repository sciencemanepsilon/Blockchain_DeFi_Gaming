apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: restiger-hpa
  namespace: prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: register-pods
  minReplicas: 1
  maxReplicas: 55
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  #- type: Resource
    #resource:
      #name: memory
      #target:
        #type: AverageValue
        #averageValue: 120Mi