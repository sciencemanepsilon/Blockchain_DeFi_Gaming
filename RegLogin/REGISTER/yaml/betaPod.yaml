apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: beta
  name: register-pods
spec:
  selector:
    matchLabels:
      POD_LABEL: register-pod-label
  replicas: 1
  template:
    metadata:
      labels:
        POD_LABEL: register-pod-label
      namespace: beta
    spec:
      serviceAccountName: iam-fire-w-auth-w-idtoken
      containers:
      - name: register-container
        image: asia-south1-docker.pkg.dev/weje-2023/gke-weje-images-india/reg-login:Register-AddEmail-GmailTok-nick2
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "1m"
            memory: "60Mi"
        envFrom:
          - configMapRef:
              name: beta-config