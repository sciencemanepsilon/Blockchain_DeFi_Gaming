apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: conncect-wallet-autoscaler
  namespace: prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: connect-wallet
  minReplicas: 1
  maxReplicas: 55
  metrics:
  - type: Object
    object:
      describedObject:
        kind: Service
        name: connect-wallet-svc
      metric:
        name: "autoscaling.googleapis.com|gclb-capacity-utilization"
      target:
        averageValue: "80"
        type: AverageValue
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 100