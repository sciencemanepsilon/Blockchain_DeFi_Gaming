apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: prod
  name: connect-wallet
spec:
  selector:
    matchLabels:
      POD_LABEL: connect-wallet-pod-label
  replicas: 1
  template:
    metadata:
      labels:
        POD_LABEL: connect-wallet-pod-label
      namespace: prod
    spec:
      serviceAccountName: fire-w
      containers:
      - name: connect-wallet-container
        image: asia-south1-docker.pkg.dev/weje-2023/gke-weje-images-india/reg-login:ConnWallet-AddEmail-ifGamePlayedNoHardIPcache2
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "54m"
            memory: "105Mi"
        envFrom:
          - configMapRef:
              name: prod-config